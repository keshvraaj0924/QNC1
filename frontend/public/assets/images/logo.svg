  </g>
  
  <!-- Arabic Corporate Name Section -->
  <g transform="translate(150, 110)">
    <text font-family="'Cairo', sans-serif" font-weight="800" font-size="22" letter-spacing="0.05em" fill="#FFFFFF">شركة قـدرات الـوطـنـيـة</text>
